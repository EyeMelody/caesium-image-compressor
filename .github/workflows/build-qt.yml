name: Build
# Builds ImageLite and uploads a Windows portable package.
on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths-ignore:
      - 'README.md'
      - 'LICENSE'
      - '.clang-format'
      - 'setup.iss'
      - '.github/ISSUE_TEMPLATE/**'
  pull_request:
    branches: [ main ]
    paths-ignore:
      - 'README.md'
      - 'LICENSE'
      - '.clang-format'
      - 'setup.iss'
      - '.github/ISSUE_TEMPLATE/**'
jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Cache libcaesium
        id: cache-libcaesium
        uses: actions/cache@v4
        env:
          cache-name: cache-libcaesium
        with:
          path: ${{github.workspace}}/build-${{ runner.os }}/libcaesium-prefix
          key: ${{ runner.os }}-build-${{ env.cache-name }}-${{ hashFiles('**/libcaesium.conf') }}

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          aqtversion: '==3.1.*'
          version: '6.8.2'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_mingw'
          modules: 'qtimageformats'
          tools: 'tools_mingw1310'
          cache: true

      - name: Install Rust target
        run: rustup target add x86_64-pc-windows-gnu

      - name: Configure CMake
        shell: pwsh
        run: cmake -DCMAKE_BUILD_TYPE=Release -DCMAKE_PREFIX_PATH="$env:QT_ROOT_DIR" -G "CodeBlocks - MinGW Makefiles" -B ${{github.workspace}}/build-${{ runner.os }}

      - name: Build
        run: cmake --build ${{github.workspace}}/build-${{ runner.os }} --config Release --target caesium_image_compressor

      - name: Package Windows portable app
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $buildDir = "${{ github.workspace }}\build-${{ runner.os }}"
          $distDir = "${{ github.workspace }}\package\ImageLite-win-portable"
          New-Item -ItemType Directory -Force -Path $distDir | Out-Null

          $exePath = Get-ChildItem -Path $buildDir -Filter "Caesium Image Compressor.exe" -Recurse -File | Select-Object -First 1 -ExpandProperty FullName
          $libCaesiumPath = Get-ChildItem -Path $buildDir -Filter "caesium.dll" -Recurse -File | Select-Object -First 1 -ExpandProperty FullName
          $winSparklePath = Get-ChildItem -Path $buildDir -Filter "WinSparkle.dll" -Recurse -File |
            Where-Object { $_.FullName -match "\\x64\\Release\\WinSparkle\.dll$" } |
            Select-Object -First 1 -ExpandProperty FullName
          if (!$winSparklePath) {
            $winSparklePath = Get-ChildItem -Path $buildDir -Filter "WinSparkle.dll" -Recurse -File |
              Select-Object -First 1 -ExpandProperty FullName
          }

          if (!$exePath) {
            Get-ChildItem -Path $buildDir -Recurse -File | Select-Object -ExpandProperty FullName
            throw "Application executable not found under $buildDir"
          }
          if (!$libCaesiumPath) {
            Get-ChildItem -Path $buildDir -Recurse -File | Select-Object -ExpandProperty FullName
            throw "libcaesium DLL not found under $buildDir"
          }
          if (!$winSparklePath) {
            Get-ChildItem -Path $buildDir -Recurse -File | Select-Object -ExpandProperty FullName
            throw "WinSparkle DLL not found under $buildDir"
          }

          Copy-Item -Path $exePath -Destination (Join-Path $distDir "ImageLite.exe")
          Copy-Item -Path $libCaesiumPath -Destination (Join-Path $distDir "caesium.dll")
          Copy-Item -Path $winSparklePath -Destination (Join-Path $distDir "WinSparkle.dll")
          Copy-Item -Path "${{ github.workspace }}\qt.conf" -Destination (Join-Path $distDir "qt.conf")

          $windeployqt = Get-Command windeployqt.exe -ErrorAction SilentlyContinue | Select-Object -First 1 -ExpandProperty Source
          if (!$windeployqt -and $env:QT_ROOT_DIR) {
            $candidate = Join-Path $env:QT_ROOT_DIR "bin\windeployqt.exe"
            if (Test-Path $candidate) {
              $windeployqt = $candidate
            }
          }
          if (!$windeployqt) {
            throw "windeployqt.exe not found. QT_ROOT_DIR='$env:QT_ROOT_DIR'"
          }

          & $windeployqt --release --compiler-runtime (Join-Path $distDir "ImageLite.exe")

          $zipPath = "${{ github.workspace }}\ImageLite-win-portable.zip"
          Compress-Archive -Path (Join-Path $distDir "*") -DestinationPath $zipPath -Force

      - name: Upload Windows portable package
        uses: actions/upload-artifact@v4
        with:
          name: ImageLite-win-portable
          path: ImageLite-win-portable.zip

